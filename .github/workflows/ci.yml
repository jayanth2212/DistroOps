name: DistroOps Continuous Integration (CI)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Backend
        run: |
          cd backend
          npm install
          chmod -R +x node_modules/.bin || true
          npx prisma generate
          npm run build

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
